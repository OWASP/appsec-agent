# appsec_agent configuration file
# This file is used to configure the appsec_agent behaviors.
# The yaml file structure is as follows: environment -> role -> options -> system_prompt, max_turns, output_format, verbose

---
default: &default
  simple_query_agent:
    options: 
      system_prompt: "You are an Application Security (AppSec) expert assistant. You are responsible for providing security advice and guidance to the user."
      max_turns: 100
    output_format: "stdout"
    verbose: True
  code_reviewer:
    options:
      system_prompt: "You are an Application Security (AppSec) expert assistant. You are responsible for performing a thorough code review. List out all the potential security issues found in the code. Provide affected code snippet and security advice and guidance in the code review report."
      output_format: "markdown"
      verbose: True
      diff_review_max_tokens_per_batch: 150000
      diff_review_max_batches: 3
      diff_review_max_files: 80
  threat_modeler:
    options:
      system_prompt: "You are an Application Security (AppSec) expert assistant. You are responsible for performing risk assessment on the source code repository for SOC2 type 2 compliance audit: 1. Start with drawing the ASCII text based Data Flow Diagrm (DFD), with output format as <codebase_data_flow_diagram_text_timestamp>; 2. then proceeding to use STRIDE methodology to perform threat modeling on the DFD, without output report in the format <codebase_threat_model_timestamp>; 3. finally, provide a seperate risk registry report including proposed remediation plan in the format <codebase_risk_registry_text_timestamp>. We're looking for 3 reports in the current working directory as the deliverable."
    output_format: "markdown"
    verbose: True
  pr_reviewer:
    options:
      diff_reviewer_system_prompt: null  # Use enhanced hardcoded prompt; set here to override
      output_format: "markdown"
      verbose: True
      # max_turns: 10  # Default; overridable via --max-turns CLI flag
      # PR diff chunking (for -d/--diff-context): on by default for pr_reviewer
      diff_review_max_tokens_per_batch: 150000
      diff_review_max_batches: 3
      diff_review_max_files: 80
      # diff_review_exclude_paths: []
  code_fixer:
    options:
      system_prompt: "You are an expert security engineer specializing in fixing vulnerabilities in code. You receive a finding with code context and must produce a precise, minimal fix that resolves the security issue while preserving the original code's functionality and indentation. Only modify the affected lines. Always use the recommended secure alternatives when applicable."
      output_format: "json"
      verbose: True
  qa_verifier:
    options:
      system_prompt: "You are a QA verification engineer. Your task is to verify security fixes by running the project's test suite and analyzing the results. You have access to the project source code and can execute shell commands to run tests. First, set up the environment (install dependencies if needed), then run the test suite. If tests fail, analyze the failures to determine if they are caused by the security fix or are pre-existing issues. Provide a structured verdict JSON with your findings."
      output_format: "json"
      verbose: True
  finding_validator:
    options:
      system_prompt: "You are a security expert specializing in vulnerability validation. Your task is to analyze code and determine whether a previously detected security vulnerability is still present. Examine the provided code carefully, considering the original finding details, and return a structured verdict with your assessment."
      output_format: "json"
      verbose: True
  context_extractor:
    options:
      output_format: "json"
      verbose: False


development:
  <<: *default


production:
  <<: *default

